<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Cafe</title>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #e7e0c9;
      color: #2f5e2f;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(255,255,255,0.3);
    }

    nav a {
      margin-right: 20px;
      text-decoration: none;
      color: #2f5e2f;
      font-weight: 600;
      font-size: 14px;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 2px;
    }

    .ticker {
      white-space: nowrap;
      overflow: hidden;
      border-top: 1px solid rgba(0,0,0,0.1);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 6px 0;
      font-size: 12px;
    }

    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 18s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    .hero {
      padding: 80px 60px 40px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.4;
    }

    .lines {
      padding: 20px 60px;
    }

    .line {
      height: 6px;
      background: #bdbdbd;
      border-radius: 10px;
      margin: 30px 0;
      opacity: 0.6;
    }

    .section-title {
      text-align: center;
      margin-top: 60px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .product {
      text-align: center;
      font-size: 12px;
    }

    .bottle {
      width: 60px;
      height: 90px;
      background: linear-gradient(#eee, #cfcfcf);
      border-radius: 10px;
      margin: 0 auto 10px;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.2);
    }

    footer {
      height: 80px;
    }

    @media (max-width: 768px) {
      .hero { font-size: 22px; padding: 60px 30px; }
      header { padding: 15px 20px; }
      .lines { padding: 20px 30px; }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">Menu</a>
      <a href="#">Librairie</a>
      <a href="#">À propos</a>
    </nav>
    <div class="logo">Sépia & Moka</div>
    <div>🛒</div>
  </header>

  <div class="ticker">
    <span>Profiter de nos boissons chaudes et de nos livres!</span>
  </div>

  <section class="hero">
    Bienvenue chère lecteurs,<br>
    CHEZ NOUS ON DÉVORE LES LIVRES AUTOUR D'UN BON CAFE!
  </section>

  <section class="lines">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </section>

  <h3 class="section-title">Parce que nous savons que vous les aimerez :p </h3>

  <section class="products">
    <div class="product">
    <img src="103507218.jpg" alt="Macha" width="200" height="220">
      <div>Macha<br>7€</div>
    </div>

    <div class="product">
      <img src="63d1e7f3-be97-494b-bc2e-2c5fc7e9b99d_bSPeBjy.jpg" alt="Moka" width="200" height="220">
      <div>Moka<br>5€</div>
    </div>

    <div class="product">
      <img src="Chai.jpg" alt="Chai" width = "200" height="220">
      <div>Chai<br>5€</div>
    </div>

    <div class="product">
     <img src="1055859-fu-patisserie-et-coffee-shop-paris-13e-cafe-latte.jpg" alt="Café" width="200" height="220">
      <div>Café<br>3€</div>
    </div>

    <div class="product">
      <img src="site-malongo-5-1024x614.jpg" alt="Latte" width="200" height="220">
      <div>Latte<br>4,50€</div>
    </div>

    <div class="product">
      <div class="bottle"></div>
      <img src="iced-coffee-drink-menu-orange-americano-fusion-with-fresh-orange-fruit-mixed-in-a-plastic-cup-drink-menu-product-free-photo.jpg" alt="thé glassé a l'orange" width="200" height="220" >
      <div>Thé glassé a l'orange<br>4,50€</div>
    </div>
  </section>

  <footer></footer>

</body>
</html>
